<!DOCTYPE html>
<html>
<head>
  <title>Configurações da Extensão</title>
  <style>
    body {
      width: 300px; /* Largura da janela popup */
      font-family: sans-serif;
    }

    label {
      display: block; /* Faz a label ocupar a linha toda */
      margin-bottom: 5px;
    }

    input[type="text"],
    textarea {
      width: 100%; /* Ocupa toda a largura disponível */
      box-sizing: border-box; /* Inclui padding e borda na largura */
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    textarea {
      resize: vertical; /* Permite redimensionar verticalmente */
      min-height: 100px; /* Altura mínima */
    }

    button {
      background-color: #4CAF50; /* Cor de fundo verde */
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
        opacity: 0.8;
    }
  </style>
</head>
<body>
  <label id="status"></label>
  <label for="api-key">Chave da API:</label>
  <input type="text" id="api-key" name="api-key" placeholder="Insira sua chave da API">

  <label for="instructions">Instruções:</label>
  <textarea id="instructions" name="instructions" placeholder="Insira as instruções aqui"></textarea>

  <button id="save-button">Salvar</button>

  <script src="popup.js"></script>  <!--  Importa o JavaScript (crie este arquivo) -->
</body>
</html>
