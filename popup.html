<!DOCTYPE html>
<html>
<head>
  <title>Auto-Proposal Settings</title>
  <style>
    body {
      width: 350px; /* Slightly wider for better layout */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* More modern font stack */
      background-color: #f4f4f4; /* Light gray background */
      color: #333; /* Darker text for better contrast */
      margin: 0; /* Remove default body margins */
      padding: 15px; /* Add padding around the content */
      border-radius: 8px; /* Rounded corners for a softer look */
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Subtle shadow */
    }

    .container {
      display: flex;
      flex-direction: column; /* Stack elements vertically */
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold; /* Make labels bold */
      color: #555; /* Slightly darker label color */
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px; /* More spacing */
      border: 1px solid #ddd; /* Lighter border */
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px; /* Consistent font size */
      transition: border-color 0.3s ease; /* Smooth border transition */
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: #4CAF50; /* Highlight on focus */
      outline: none; /* Remove default focus outline */
    }

    textarea {
      resize: vertical;
      min-height: 120px; /* Slightly taller textarea */
    }

    button {
      background-color: #4CAF50;
      color: white;
      padding: 12px 18px; /* Larger button */
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px; /* Larger font size */
      transition: background-color 0.3s ease; /* Smooth background transition */
      margin-top: 5px; /* Spacing above the button */
      align-self: flex-start; /* Align button to the left */
    }

    button:hover {
      background-color: #3e8e41; /* Darker green on hover */
    }

    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      display: none; /* Hidden by default */
    }

    .status.success {
      background-color: #d4edda; /* Light green background */
      color: #155724; /* Dark green text */
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background-color: #f8d7da; /* Light red background */
      color: #721c24; /* Dark red text */
      border: 1px solid #f5c6cb;
      display: block;
    }
    /*  Styling for Opera GX */
        input[type="text"], textarea {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        input[type="text"]::-webkit-search-decoration,
        input[type="text"]::-webkit-search-cancel-button,
        input[type="text"]::-webkit-search-results-button,
        input[type="text"]::-webkit-search-results-decoration {
            -webkit-appearance: none;
        }

    textarea {
      font-family: inherit; /* Ensure textarea inherits font */
    }
  </style>
</head>
<body>
  <div class="container">
    <label for="api-key">API Key:</label>
    <input type="text" id="api-key" name="api-key" placeholder="Enter your API key">

    <label for="instructions">Instructions:</label>
    <textarea id="instructions" name="instructions" placeholder="Enter your instructions"></textarea>

    <button id="save-button">Save</button>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
